name: GitHub Stats

on:
  schedule:
    - cron: "0 0 * * 1,3,5"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: GitHub Stats Card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: doemefu
          PAT_1: ${{ secrets.METRICS_TOKEN }}
          output_filename: github-stats.svg

      - name: Top Languages Card
        uses: anuraghazra/github-readme-stats@master
        with:
          username: doemefu
          PAT_1: ${{ secrets.METRICS_TOKEN }}
          card_type: top-langs
          output_filename: github-top-langs.svg

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add github-stats.svg github-top-langs.svg
          git diff --staged --quiet || git commit -m "Update GitHub stats"
          git push
